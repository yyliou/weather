<svg width="439" height="508" viewBox="0 0 439 508" xmlns="http://www.w3.org/2000/svg">
  <!--
    twweather hex sticker
    hexb.in spec: pointy-top hexagon, 4.39 x 5.08 cm (439 x 508 px here)
    Vertices: top(219.5,0) UR(439,127) LR(439,381) bottom(219.5,508) LL(0,381) UL(0,127)
  -->
  <defs>
    <!-- sky / ocean gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1b3b63"/>
      <stop offset="55%" stop-color="#2f6aa6"/>
      <stop offset="100%" stop-color="#3f8fd1"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ffe680"/>
      <stop offset="70%" stop-color="#ffcb3d"/>
      <stop offset="100%" stop-color="#f5b400"/>
    </radialGradient>
    <!-- clip everything to the hex -->
    <clipPath id="hexclip">
      <polygon points="219.5,6 433,130 433,378 219.5,502 6,378 6,130"/>
    </clipPath>
  </defs>

  <!-- hex body -->
  <polygon points="219.5,6 433,130 433,378 219.5,502 6,378 6,130" fill="url(#sky)"/>

  <g clip-path="url(#hexclip)">
    <!-- sun upper-left with rays -->
    <g transform="translate(128,150)">
      <g stroke="#ffd75e" stroke-width="6" stroke-linecap="round" opacity="0.9">
        <line x1="0" y1="-58" x2="0" y2="-44"/>
        <line x1="41" y1="-41" x2="31" y2="-31"/>
        <line x1="58" y1="0" x2="44" y2="0"/>
        <line x1="41" y1="41" x2="31" y2="31"/>
        <line x1="-41" y1="-41" x2="-31" y2="-31"/>
        <line x1="-58" y1="0" x2="-44" y2="0"/>
        <line x1="-41" y1="41" x2="-31" y2="31"/>
        <line x1="0" y1="58" x2="0" y2="44"/>
      </g>
      <circle cx="0" cy="0" r="30" fill="url(#sun)"/>
    </g>

    <!-- cloud + rain upper-right -->
    <g transform="translate(268,132)">
      <g fill="#eaf4ff">
        <circle cx="-26" cy="6" r="22"/>
        <circle cx="4" cy="-8" r="28"/>
        <circle cx="34" cy="6" r="22"/>
        <rect x="-46" y="6" width="84" height="26" rx="13"/>
      </g>
      <g stroke="#bfe3ff" stroke-width="6" stroke-linecap="round" opacity="0.95">
        <line x1="-26" y1="40" x2="-34" y2="62"/>
        <line x1="2"   y1="42" x2="-6"  y2="64"/>
        <line x1="30"  y1="40" x2="22"  y2="62"/>
      </g>
    </g>

    <!-- Taiwan island silhouette (stylized), sized to clear the name band -->
    <path d="M 213 170
             C 223 182, 229 198, 233 220
             C 238 244, 250 262, 254 288
             C 257 310, 249 330, 237 348
             C 230 357, 223 362, 215 364
             C 209 359, 205 351, 202 342
             C 194 320, 188 296, 186 270
             C 184 244, 189 214, 198 188
             C 203 176, 206 178, 213 170 Z"
          fill="#79c79b" stroke="#d7f2e3" stroke-width="3"/>
    <!-- central mountain ridge hint -->
    <path d="M 213 190 C 219 222, 220 262, 214 340"
          fill="none" stroke="#4ea478" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

    <!-- name plate band for contrast (clipped inside hex) -->
    <rect x="6" y="402" width="427" height="50" fill="#16314f" opacity="0.5"/>
  </g>

  <!-- package name -->
  <text x="219.5" y="441" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="40" font-weight="700"
        fill="#ffffff" letter-spacing="0.5">twweather</text>

  <!-- hex border -->
  <polygon points="219.5,6 433,130 433,378 219.5,502 6,378 6,130"
           fill="none" stroke="#9fd0f5" stroke-width="11"/>
  <polygon points="219.5,6 433,130 433,378 219.5,502 6,378 6,130"
           fill="none" stroke="#1b3b63" stroke-width="2"/>
</svg>
